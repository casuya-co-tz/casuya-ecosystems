name: casuya-ecosystem

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-health: &health-check
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casuya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-casuya}
      POSTGRES_DB: ${POSTGRES_DB:-casuya}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      <<: *health-check
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casuya}"]
    restart: unless-stopped
    networks:
      - casuya

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    logging: *default-logging
    healthcheck:
      <<: *health-check
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped
    networks:
      - casuya

  api:
    build:
      context: ./casuya-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgres://${POSTGRES_USER:-casuya}:${POSTGRES_PASSWORD:-casuya}@postgres:5432/${POSTGRES_DB:-casuya}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      <<: *health-check
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    restart: unless-stopped
    networks:
      - casuya

  frontend:
    build:
      context: ./casuya-platform
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    logging: *default-logging
    healthcheck:
      <<: *health-check
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    restart: unless-stopped
    networks:
      - casuya

  worker:
    build:
      context: ./casuya-orchestrator
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgres://${POSTGRES_USER:-casuya}:${POSTGRES_PASSWORD:-casuya}@postgres:5432/${POSTGRES_DB:-casuya}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
    networks:
      - casuya

networks:
  casuya:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
